name: Revalidate (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual revalidation"
        required: false
        default: "Manual trigger"

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger revalidation
        run: |
          echo "Manual revalidation: ${{ github.event.inputs.reason }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${REVALIDATE_ENDPOINT}/api/revalidate?secret=${REVALIDATE_SECRET}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Revalidation succeeded (HTTP $HTTP_CODE)"
          else
            echo "Revalidation failed (HTTP $HTTP_CODE)"
            exit 1
          fi
        env:
          # Set vars.REVALIDATE_ENDPOINT in repo settings (e.g. https://blog.jmarcosg.dev)
          REVALIDATE_ENDPOINT: ${{ vars.REVALIDATE_ENDPOINT }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
